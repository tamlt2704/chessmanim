# **GitHub Actions workflow to render chess game video using Manim**
# **Triggers on push/PR to main/master branches or manual dispatch**
name: Render Chess Video

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      pgn_file:
        description: 'PGN file to render (without .pgn extension)'
        required: false
        default: 'steinitz_bardeleben'
      output_name:
        description: 'Output video name (without extension)'
        required: false
        default: 'ChessGame'

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        
    - name: Set up Python
      run: uv python install 3.11
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg
        
    - name: Install Python dependencies
      run: |
        uv sync
        
    - name: Render video
      env:
        PGN_FILE: ${{ github.event.inputs.pgn_file || 'steinitz_bardeleben' }}
        OUTPUT_NAME: ${{ github.event.inputs.output_name || 'ChessGame' }}
      run: |
        uv run manim -qh chess_game.py $OUTPUT_NAME
    
    - name: Add background music (optional)
      if: true  # Set to true and add music.mp3 to repo to enable
      env:
        OUTPUT_NAME: ${{ github.event.inputs.output_name || 'ChessGame' }}
      run: |
        ffmpeg -i media/videos/chess_game/1080p60/${OUTPUT_NAME}.mp4 -i music.mp3 -filter_complex "[1:a]volume=0.3[a]" -map 0:v -map "[a]" -c:v copy -c:a aac -shortest media/videos/chess_game/1080p60/${OUTPUT_NAME}_with_music.mp4
        mv media/videos/chess_game/1080p60/${OUTPUT_NAME}_with_music.mp4 media/videos/chess_game/1080p60/${OUTPUT_NAME}.mp4
        
    - name: Upload video artifact
      env:
        OUTPUT_NAME: ${{ github.event.inputs.output_name || 'ChessGame' }}
      uses: actions/upload-artifact@v4
      with:
        name: chess-video-${{ github.event.inputs.output_name || 'ChessGame' }}
        path: media/videos/chess_game/1080p60/${{ github.event.inputs.output_name || 'ChessGame' }}.mp4
        retention-days: 30
